<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cactu · Base de Criativos</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  /*
    BASE DE CRIATIVOS · CACTU
    ------------------------------------------------------------------
    Este arquivo é só o molde visual.
    Não coloque textos finais aqui.
    O conteúdo é injetado pelo arquivo export-creativos.js.

    Estrutura exportável:
    - .feed-base  = criativo quadrado para feed
    - .story-base = criativo vertical para stories/reels
  */

  :root {
    --grafite:  #1E2629;
    --grafite2: #243033;
    --verde:    #4CAF27;
    --verde-dim: rgba(76,175,39,0.15);
    --verde-glow: rgba(76,175,39,0.08);
    --azul:     #0D6EBD;
    --azul-dim: rgba(13,110,189,0.15);
    --branco:   #FFFFFF;
    --branco-78: rgba(255,255,255,0.78);
    --branco-70: rgba(255,255,255,0.70);
    --branco-10: rgba(255,255,255,0.10);
    --branco-06: rgba(255,255,255,0.06);
  }

  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: #111518;
    font-family: 'Montserrat', Arial, sans-serif;
    padding: 52px 28px 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 64px;
  }

  .page-header { text-align: center; }
  .page-title {
    font-weight: 800;
    font-size: 18px;
    color: #fff;
    letter-spacing: -.02em;
  }
  .page-sub {
    font-size: 11px;
    color: #667074;
    letter-spacing: .06em;
    margin-top: 6px;
  }

  .row {
    display: flex;
    gap: 48px;
    flex-wrap: wrap;
    justify-content: center;
    align-items: flex-start;
  }

  .piece-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: #667074;
  }

  /* Dimensões reais do molde em CSS px.
     A alta definição é controlada no Playwright pelo deviceScaleFactor. */
  .creative {
    background: var(--grafite);
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
    isolation: isolate;
  }

  .feed-base { width: 540px; height: 540px; }
  .story-base { width: 337px; height: 599px; }

  .grid-bg {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image:
      linear-gradient(rgba(76,175,39,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(76,175,39,.04) 1px, transparent 1px);
    background-size: 46px 46px;
  }

  .glow-circle {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
  }

  .top-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--verde), var(--azul));
    z-index: 5;
  }

  .cnt {
    position: absolute;
    inset: 0;
    z-index: 2;
    display: grid;
    min-height: 0;
  }

  .brand-lockup {
    position: relative;
    z-index: 4;
    width: fit-content;
    line-height: 0;
  }

  .brand-logo {
    display: block;
    width: 100%;
    height: auto;
    filter: drop-shadow(0 10px 18px rgba(0,0,0,.15));
  }

  .feed-base .brand-lockup { width: 118px; }
  .story-base .brand-lockup { width: 84px; }

  .pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 8px;
    font-weight: 800;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--verde);
    border: 1px solid rgba(76,175,39,.35);
    padding: 4px 10px;
    border-radius: 3px;
    background: var(--verde-glow);
    width: fit-content;
    max-width: 100%;
    white-space: nowrap;
  }

  .pill::before {
    content: '';
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--verde);
    flex-shrink: 0;
  }

  .headline {
    color: var(--branco);
    font-weight: 900;
    letter-spacing: -.032em;
    text-wrap: balance;
  }

  .headline em { font-style: normal; color: var(--verde); }

  .sub {
    color: var(--branco-78);
    font-weight: 500;
    text-wrap: pretty;
  }

  .cta {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: var(--verde);
    color: var(--grafite);
    font-weight: 900;
    font-size: 10px;
    letter-spacing: .04em;
    text-transform: uppercase;
    padding: 12px 22px;
    border-radius: 4px;
    min-height: 38px;
    max-width: 100%;
    white-space: nowrap;
  }

  .cta.wide { width: 100%; }
  .cta svg { width: 13px; height: 13px; flex-shrink: 0; }
  .wa { fill: var(--grafite); }

  .footer-line,
  .site-label {
    font-size: 8.5px;
    font-weight: 500;
    letter-spacing: .05em;
    color: rgba(255,255,255,.32);
    position: relative;
    z-index: 4;
  }

  .site-label {
    text-align: center;
    font-size: 8px;
    letter-spacing: .08em;
  }

  .corner {
    position: absolute;
    bottom: 26px;
    right: 28px;
    font-size: 8px;
    font-weight: 500;
    letter-spacing: .06em;
    color: rgba(255,255,255,.13);
    z-index: 1;
    pointer-events: none;
  }

  .divider { width: 100%; height: 1px; background: var(--branco-10); }

  .chips { display: flex; flex-wrap: wrap; gap: 5px; }

  .chip {
    font-size: 8px;
    font-weight: 700;
    letter-spacing: .06em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 3px;
    border: 1px solid var(--branco-10);
    color: var(--branco-70);
    background: var(--branco-06);
  }

  .chip.verde { color: var(--verde); border-color: rgba(76,175,39,.3); background: var(--verde-glow); }
  .chip.azul  { color: var(--azul); border-color: rgba(13,110,189,.3); background: var(--azul-dim); }

  /* FEED */
  .feed-base .cnt {
    padding: 28px 42px 30px;
    grid-template-rows: auto 1fr auto;
    gap: 16px;
  }

  .feed-base .main-copy {
    align-self: center;
    width: 330px;
    max-width: 330px;
    position: relative;
    z-index: 4;
  }

  .feed-base .headline {
    font-size: 36px;
    line-height: 1.055;
    margin: 15px 0 12px;
  }

  .feed-base .sub {
    font-size: 11px;
    line-height: 1.68;
    max-width: 318px;
    margin-bottom: 20px;
  }


  .big-bars {
    position: absolute;
    bottom: 0;
    right: 34px;
    display: flex;
    align-items: flex-end;
    gap: 8px;
    opacity: .06;
    pointer-events: none;
    z-index: 1;
  }

  /* STORY */
  .story-base .cnt {
    padding: 24px 26px 26px;
    grid-template-rows: auto 1fr auto;
    gap: 12px;
  }

  .story-base .corner { display: none; }

  .story-base .main-copy {
    align-self: center;
    min-width: 0;
    position: relative;
    z-index: 4;
  }

  .story-base .pill {
    font-size: 7.2px;
    padding: 4px 8px;
    letter-spacing: .1em;
  }

  .story-base .headline {
    font-size: 25px;
    line-height: 1.075;
    margin: 11px 0 10px;
    letter-spacing: -.03em;
  }

  .story-base .sub {
    font-size: 9.2px;
    line-height: 1.62;
    margin-bottom: 11px;
  }

  .pains {
    display: flex;
    flex-direction: column;
    gap: 5px;
    margin-bottom: 11px;
  }

  .pain-row {
    display: flex;
    align-items: center;
    min-height: 28px;
    font-size: 8.8px;
    color: var(--branco-70);
    line-height: 1.35;
    padding: 7px 9px;
    background: var(--branco-06);
    border-left: 2px solid var(--verde);
    border-radius: 0 3px 3px 0;
  }

  .section-label {
    font-size: 7.6px;
    font-weight: 800;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: rgba(255,255,255,.38);
    margin: 10px 0 7px;
  }

  .story-base .chip { font-size: 7.4px; padding: 3px 7px; }
  .story-base .bottom { position: relative; z-index: 4; }

  .story-base .cta {
    font-size: 9px;
    padding: 11px 12px;
    margin-bottom: 8px;
    letter-spacing: .035em;
  }

  /*
    AJUSTE DE COMPOSIÇÃO · FLOW ORGANIZADO
    ------------------------------------------------------------------
    Alteração feita somente via CSS.
    Objetivo:
    - centralizar logo, texto e CTA;
    - organizar os 4 itens do fluxo como uma régua clara;
    - remover o corner lateral, que repetia informação sem função visual.
  */

  .corner {
    display: none !important;
  }

  .brand-lockup {
    justify-self: center;
  }

  .feed-base .brand-lockup {
    width: 126px;
  }

  .story-base .brand-lockup {
    width: 92px;
  }

  .feed-base .cnt {
    padding: 30px 48px 30px;
    grid-template-rows: auto 1fr auto;
    gap: 14px;
  }

  .feed-base .main-copy {
    align-self: end;
    justify-self: center;
    width: 420px;
    max-width: 420px;
    margin-bottom: 10px;
    text-align: center;
  }

  .feed-base .pill,
  .story-base .pill {
    margin-inline: auto;
    border-radius: 999px;
  }

  .feed-base .headline {
    max-width: 420px;
    margin: 14px auto 12px;
    font-size: 34px;
    line-height: 1.06;
    text-align: center;
  }

  .feed-base .sub {
    max-width: 360px;
    margin: 0 auto 18px;
    font-size: 11px;
    line-height: 1.64;
    text-align: center;
  }

  .feed-base .cta,
  .story-base .cta {
    margin-inline: auto;
    border-radius: 7px;
    box-shadow: 0 10px 24px rgba(76, 175, 39, .16);
  }


  .footer-line,
  .site-label {
    justify-self: center;
    text-align: center;
  }

  .story-base .cnt {
    padding: 26px 26px 26px;
  }

  .story-base .main-copy {
    align-self: center;
    justify-self: center;
    text-align: center;
  }

  .story-base .headline {
    text-align: center;
  }

  .story-base .sub {
    max-width: 260px;
    margin-inline: auto;
    text-align: center;
  }

  .pains {
    align-items: stretch;
  }

  .pain-row {
    justify-content: center;
    min-height: 30px;
    border-left: 0;
    border-top: 2px solid var(--verde);
    border-radius: 4px;
    text-align: center;
  }

  .section-label {
    text-align: center;
  }

  .chips {
    justify-content: center;
  }

  .feed-base .main-copy {
    width: 380px;
    max-width: 380px;
  }


  .feed-base .cta {
    margin-top: 0;
  }

  /* PADRONIZAÇÃO · feed usando o mesmo bloco de temas/chips do story
     -------------------------------------------------------------- */


  .feed-base .section-label {
    display: block;
    font-size: 8px;
    font-weight: 800;
    letter-spacing: .10em;
    text-transform: uppercase;
    color: rgba(255,255,255,.38);
    margin: 16px 0 8px;
    text-align: left;
  }

  .feed-base .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 18px;
  }

  .feed-base .chip {
    font-size: 8px;
    font-weight: 700;
    letter-spacing: .06em;
    text-transform: uppercase;
    padding: 4px 9px;
    border-radius: 3px;
    border: 1px solid var(--branco-10);
    color: var(--branco-70);
    background: var(--branco-06);
  }

  .feed-base .chip.verde {
    color: var(--verde);
    border-color: rgba(76,175,39,.3);
    background: var(--verde-glow);
  }

  .feed-base .chip.azul {
    color: var(--azul);
    border-color: rgba(13,110,189,.3);
    background: var(--azul-dim);
  }

  /* AJUSTE DE RESPIRO VERTICAL · conteúdo mais alto
     --------------------------------------------------------------
     Reduz o "buraco" visual entre topo/logo e bloco principal quando
     o criativo tem pouco texto, sem depender de JS.
  */

  .feed-base .cnt {
    padding-top: 24px;
    padding-bottom: 28px;
    grid-template-rows: auto minmax(0, 1fr) auto;
  }

  .feed-base .brand-lockup {
    align-self: start;
  }

  .feed-base .main-copy {
    align-self: start;
    margin-top: 48px;
  }

  .feed-base .headline {
    margin-top: 13px;
  }

  .feed-base .section-label {
    margin-top: 14px;
  }

  .story-base .cnt {
    padding-top: 22px;
    padding-bottom: 24px;
    grid-template-rows: auto minmax(0, 1fr) auto;
  }

  .story-base .brand-lockup {
    align-self: start;
  }

  .story-base .main-copy {
    align-self: start;
    margin-top: 58px;
  }

  .story-base .headline {
    margin-top: 10px;
  }

  @media (max-width: 900px) {
    .feed-base .main-copy {
      margin-top: 44px;
    }

    .story-base .main-copy {
      margin-top: 52px;
    }
  }

</style>
</head>

  <div class="page-title">Cactu · Base de criativos</div>
  <p class="page-sub">molde visual sem texto final · conteúdo via export-creativos.js</p>
